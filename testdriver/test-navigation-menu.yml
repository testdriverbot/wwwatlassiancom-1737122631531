version: 4.1.35
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on the "Products" dropdown in the navigation menu.
    commands:
      - command: hover-text
        text: Products
        description: products dropdown in the navigation menu
        action: click
  - prompt: Assert that the products list is displayed.
    commands:
      - command: assert
        expect: the products list is displayed
