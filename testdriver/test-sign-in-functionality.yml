version: 4.1.35
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click the "Sign in" link in the top-right corner.
    commands:
      - command: hover-text
        text: Sign in
        description: sign in link in the top-right corner of the header
        action: click
  - prompt: Assert that the sign in page is displayed.
    commands:
      - command: assert
        expect: Log in to continue is visible on the page
  - prompt: Enter test credentials and submit.
    commands:
      - command: hover-text
        text: Enter your email
        description: email input field
        action: click
      - command: type
        text: test@example.com
      - command: hover-text
        text: Continue
        description: continue button below the email input
        action: click
  - prompt: >-
      Assert that the dashboard or account page loads indicating successful sign
      in.  # Use the content of the file from the environment
    commands:
      - command: wait-for-text
        text: Welcome to your dashboard
